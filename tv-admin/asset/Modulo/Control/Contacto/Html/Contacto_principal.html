<style>
    /* Efecto cursor y contraste para la tabla de inbox */
    .enlace { cursor: pointer; }
    
    .table-hover tbody tr:hover td,
    .table-hover tbody tr:hover td.mailbox-name,
    .table-hover tbody tr:hover td.mailbox-subject,
    .table-hover tbody tr:hover td.mailbox-date {
        color: #ffffff !important;
    }
    
    /* Evita que los botones pierdan forma al pasar el mouse */
    .table-hover tbody tr:hover td .btn-outline-light {
        color: #fff !important;
        border-color: rgba(255,255,255,0.5) !important;
    }
    .table-hover tbody tr:hover td .btn-outline-light:hover {
        background-color: #fff !important;
        color: #dc3545 !important;
    }

    .estrella-vacia {
        color: rgba(0, 0, 0, 0.1) !important;
        text-shadow: 1px 1px 0px #fff;
    }

    .estrella-vacia:hover {
        color: #ffc107 !important;
        opacity: 0.7;
    }

    .table-danger .estrella-vacia {
        color: rgba(221, 0, 7, 0.2) !important;
    }

    .icono-accion {
        color: #6c757d !important;
        transition: all 0.2s;
    }

    .table-danger .icono-accion {
        color: #495057 !important;
    }

    .btn-outline-secondary:hover .icono-accion {
        color: #de0007 !important;
        transform: scale(1.1);
    }

    .table-hover tbody tr:hover td .icono-accion {
        color: #ffffff !important;
    }
</style>

<div ng-controller="ContactoCtrl" ng-cloak>
    <section class="content-header">
        <div class="container-fluid">
            <div class="row mb-2 align-items-center">
                <div class="col-sm-6">
                    <h1 class="m-0 text-dark font-weight-bold">
                        <i class="fa fa-envelope text-danger mr-2"></i> Bandeja de Contacto
                    </h1>
                </div>
                <div class="col-sm-6">
                    <ol class="breadcrumb float-sm-right">
                        <li class="breadcrumb-item"><a href="?mod=home">Inicio</a></li>
                        <li class="breadcrumb-item active">Contacto</li>
                    </ol>
                </div>
            </div>
        </div>
    </section>

    <section class="content">
        <div class="row">
            <div class="col-md-3">
                <div class="card shadow-sm border-top-primary">
                    <div class="card-header bg-white">
                        <h3 class="card-title font-weight-bold"><i class="fa fa-folder-open text-primary mr-1"></i> Carpetas</h3>
                    </div>
                    <div class="card-body p-0">
                        <ul class="nav nav-pills flex-column">
                            <li class="nav-item active">
                                <a href="?mod=Contacto" class="nav-link text-dark bg-light font-weight-bold">
                                    <i class="fa fa-inbox mr-2 text-primary"></i> Bandeja de Entrada
                                    <span class="badge bg-danger float-right shadow-sm mt-1" ng-show="datos.msgnuevos > 0">{{datos.msgnuevos}}</span>
                                </a>
                            </li>
                        </ul>
                    </div>
                </div>
            </div>
            
            <div class="col-md-9">
                <div class="card card-danger card-outline shadow-sm">
                    <div class="card-header bg-white border-bottom-0 pt-3 pb-2 d-flex justify-content-between align-items-center">
                        <h3 class="card-title font-weight-bold text-dark m-0">
                            <i class="fa fa-list mr-1"></i> Mensajes Recibidos
                        </h3>
                    </div>
                    
                    <div class="card-body p-0">
                        <div class="table-responsive mailbox-messages">
                            <table class="table table-hover table-striped mb-0 text-sm" datatable="ng" ng-if="datos.Data && datos.Data.length > 0">
                                <thead class="thead-light">
                                    <tr>
                                        <th width="5%" class="text-center"><i class="fa fa-star text-warning"></i></th>
                                        <th width="20%">Remitente</th>
                                        <th width="30%">Correo</th>
                                        <th width="15%">Teléfono</th>
                                        <th width="15%">Fecha</th>
                                        <th width="15%" class="text-center">Acciones</th>
                                    </tr>
                                </thead>
                                <tbody>
                                    <tr ng-repeat="dato in datos.Data" 
                                        class="{{dato.leido == 0 ? 'table-danger font-weight-bold' : 'text-muted'}} enlace" 
                                        ng-click="viewMsg(dato._id);">
                                        
                                        <td class="text-center align-middle" ng-click="toggleDestacado(dato._id, $event)">
                                            <i class="fa fa-lg fa-star {{dato.destacado == 1 ? 'text-warning' : 'estrella-vacia'}}"></i>
                                        </td>
                                        
                                        <td class="mailbox-name align-middle">
                                            <i class="fa {{dato.leido == 0 ? 'fa-envelope text-danger' : 'fa-envelope-open-o'}} mr-2"></i> 
                                            {{dato.Nombre}}
                                        </td>
                                        <td class="mailbox-subject align-middle">{{dato.Email}}</td>
                                        <td class="mailbox-subject align-middle">{{dato.Telefono}}</td>
                                        <td class="mailbox-date align-middle">{{dato.Fecha.substr(0,10) | date:'dd/MM/yyyy'}}</td>
                                        
                                        <td class="text-center align-middle">
                                            <button class="btn btn-sm btn-outline-secondary border-0 mr-1" 
                                                    title="{{dato.leido == 1 ? 'Marcar como No Leído' : 'Marcar como Leído'}}" 
                                                    ng-click="toggleLeido(dato._id, dato.leido, $event)">
                                                <i class="fa fa-lg {{dato.leido == 1 ? 'fa-envelope-open' : 'fa-envelope'}} icono-accion"></i>
                                            </button>
                                            
                                            <button class="btn btn-sm btn-outline-danger border-0" 
                                                    title="Eliminar Mensaje" 
                                                    ng-click="eliminarMsg(dato._id, $event)">
                                                <i class="fa fa-trash"></i>
                                            </button>
                                        </td>
                                    </tr>
                                </tbody>
                            </table>

                            <div class="text-center py-5 text-muted" ng-if="!datos.Data || datos.Data.length == 0">
                                <i class="fa fa-inbox fa-3x mb-3 text-light"></i><br>
                                <h5 class="font-weight-light">Tu bandeja de entrada está vacía.</h5>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </section>
</div>
