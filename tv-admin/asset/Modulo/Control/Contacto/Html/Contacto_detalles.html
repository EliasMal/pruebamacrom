<div ng-controller="ContactoCtrl" ng-cloak>
    <section class="content-header" ng-init="data.id='{_id}'">
        <div class="container-fluid">
            <div class="row mb-2 align-items-center">
                <div class="col-sm-6">
                    <h1 class="m-0 text-dark font-weight-bold">
                        <i class="fa fa-envelope-open text-danger mr-2"></i> Leer Mensaje
                    </h1>
                </div>
                <div class="col-sm-6">
                    <ol class="breadcrumb float-sm-right">
                        <li class="breadcrumb-item"><a href="?mod=home">Inicio</a></li>
                        <li class="breadcrumb-item"><a href="?mod=Contacto">Contacto</a></li>
                        <li class="breadcrumb-item active">Detalles</li>
                    </ol>
                </div>
            </div>
        </div>
    </section>

    <section class="content">
        <div class="row">
            
            <div class="col-md-3">
                <div class="card shadow-sm border-top-primary">
                    <div class="card-header bg-white">
                        <h3 class="card-title font-weight-bold"><i class="fa fa-folder-open text-primary mr-1"></i> Carpetas</h3>
                        <div class="card-tools">
                            <button type="button" class="btn btn-tool" data-widget="collapse"><i class="fa fa-minus"></i></button>
                        </div>
                    </div>
                    <div class="card-body p-0">
                        <ul class="nav nav-pills flex-column">
                            <li class="nav-item active">
                                <a href="?mod=Contacto" class="nav-link text-dark bg-light font-weight-bold">
                                    <i class="fa fa-inbox mr-2 text-primary"></i> Bandeja de Entrada
                                    <span class="badge bg-danger float-right shadow-sm mt-1" ng-show="datos.msgnuevos > 0">{{datos.msgnuevos}}</span>
                                </a>
                            </li>
                        </ul>
                    </div>
                </div>
            </div>

            <div class="col-md-9">
                <div class="card card-danger card-outline shadow-sm">
                    <div class="card-header bg-white border-bottom-0 pt-3 pb-2">
                        <h3 class="card-title font-weight-bold text-dark">
                            <i class="fa fa-envelope-open-text mr-1"></i> Detalles del Contacto
                        </h3>
                    </div>
                    
                    <div class="card-body p-0">
                        <div class="mailbox-read-info p-4 bg-light border-bottom border-top">
                            <div class="d-flex justify-content-between align-items-center mb-2">
                                <h5 class="font-weight-bold text-danger m-0">
                                    <i class="fa fa-user-circle text-muted mr-1"></i> {{datos.Data.Nombre}}
                                </h5>
                                <span class="mailbox-read-time text-muted small font-weight-bold">
                                    <i class="fa fa-calendar mr-1"></i> {{datos.Data.Fecha}}
                                </span>
                            </div>
                            <h6 class="text-muted mb-1">
                                <i class="fa fa-envelope mr-1 w-20px text-center"></i> Correo: 
                                <a href="mailto:{{datos.Data.Email}}" class="text-primary">{{datos.Data.Email}}</a>
                            </h6>
                            <h6 class="text-muted mb-0">
                                <i class="fa fa-phone mr-1 w-20px text-center"></i> Teléfono: 
                                <span class="text-dark">{{datos.Data.Telefono}}</span>
                            </h6>
                        </div>
                        
                        <div class="mailbox-read-message p-4 text-justify text-dark" style="min-height: 250px; font-size: 1.05rem; line-height: 1.6;">
                            <p style="white-space: pre-wrap;">{{datos.Data.Mensaje}}</p>
                        </div>
                    </div>
                    
                    <div class="card-footer bg-white text-right">
                        <button class="btn btn-outline-secondary shadow-sm px-4 font-weight-bold" type="button" ng-click="btnRegresar()">
                            <i class="fa fa-reply mr-1"></i> Volver a la Bandeja
                        </button>
                    </div>
                </div>
            </div>

        </div>
    </section>
</div>
