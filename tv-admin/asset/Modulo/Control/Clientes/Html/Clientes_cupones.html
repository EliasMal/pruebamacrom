<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
<link rel="stylesheet" href="/asset/Css/cupones.css">
<div class="admin-cupones" ng-controller="ClientesCuponesCtrl">

    <div class="header-cupones">
        <h2> <i class="fas fa-ticket-alt"></i> Administración de Cupones</h2>
    </div>

    <!-- Crear Cupón -->
    <div class="card card-form">
        <h3>Crear nuevo cupón</h3>

        <div class="form-grid">

            <div class="form-group">
                <label>Código</label>
                <input type="text" ng-model="nuevo.codigo" placeholder="Ej. PROMO10">
            </div>

            <div class="form-group">
                <label>Descuento (%)</label>
                <input type="number" ng-model="nuevo.descuento">
            </div>

            <div class="form-group checkbox">
                <label>
                    <input type="checkbox" ng-model="nuevo.uso_unico">
                    Uso único
                </label>
            </div>

            <div class="form-group checkbox">
                <label>
                    <input type="checkbox" ng-model="nuevo.es_global">
                    Cupón global
                </label>
            </div>

            <div class="form-group">
                <label>Fecha expiración</label>
                <input type="date" ng-model="nuevo.fecha_expiracion">
            </div>

        </div>

        <button class="btn-primary" ng-click="crearCupon()">
            Crear Cupón
        </button>
    </div>


    <!-- Tabla -->
    <div class="card">

        <h3>Cupones registrados</h3>

        <div class="table-responsive">
            <table class="tabla-cupones">
                <thead>
                    <tr>
                        <th>Código</th>
                        <th>Descuento</th>
                        <th>Uso único</th>
                        <th>Global</th>
                        <th>Estado</th>
                        <th>Expira</th>
                        <th>Acciones</th>
                    </tr>
                </thead>

                <tbody>
                    <tr ng-repeat="c in cupones">
                        <td class="codigo">{{c.codigo}}</td>

                        <td>
                            <span class="badge-desc">{{c.descuento}}%</span>
                        </td>

                        <td>
                            <span class="badge" 
                                  ng-class="{'badge-yes': c.uso_unico == 1, 'badge-no': c.uso_unico == 0}">
                                {{c.uso_unico == 1 ? 'Sí' : 'No'}}
                            </span>
                        </td>

                        <td>
                            <button class="btn-switch"
                                    ng-class="{'active-switch': c.es_global == 1}"
                                    ng-click="toggleGlobal(c.id)">
                                {{c.es_global == 1 ? 'Global' : 'Específico'}}
                            </button>
                        </td>

                        <td>
                            <button class="btn-switch"
                                    ng-class="{'active-switch': c.activo == 1}"
                                    ng-click="toggleActivo(c.id)">
                                {{c.activo == 1 ? 'Activo' : 'Inactivo'}}
                            </button>
                        </td>

                        <td>
                            {{c.fecha_expiracion || 'Sin fecha'}}
                        </td>

                        <td>
                            <button class="btn-danger"
                                    ng-click="eliminar(c.id)">
                                Eliminar
                            </button>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>

    </div>

</div>
