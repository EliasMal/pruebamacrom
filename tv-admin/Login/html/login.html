<!DOCTYPE html>
<html>
    <head>
        <meta charset="utf-8">
        <meta http-equiv="X-UA-Compatible" content="IE=edge">
        <title>Refaccionaria TsuruVolks | Log in</title>
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <link rel="stylesheet" href="./../asset/Css/style.css">
        <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/font-awesome/4.4.0/css/font-awesome.min.css">
        <link rel="stylesheet" href="https://code.ionicframework.com/ionicons/2.0.1/css/ionicons.min.css">
        <link rel="stylesheet" href="./../asset/Css/adminlte.min.css">
        <link rel="stylesheet" href="./../asset/Plugins/iCheck/square/blue.css">
        <link rel="stylesheet" href="//cdnjs.cloudflare.com/ajax/libs/toastr.js/latest/toastr.min.css">
        <link href="https://fonts.googleapis.com/css?family=Source+Sans+Pro:300,400,400i,700" rel="stylesheet">
        
        <style>
            :root {
              --primario: #de0007;
              --primario-oscuro: #bf040a;
              --blanco: #fff;
            }
            .login-box .btn-primary {
              background-color: var(--primario);
              border-color: var(--primario);
              color: var(--blanco);
              transition: all 0.3s ease;
            }
            .login-box .btn-primary:hover,
            .login-box .btn-primary:focus {
              background-color: var(--primario-oscuro) !important;
              border-color: var(--primario-oscuro) !important;
            }
            .login-box .btn-primary:disabled {
              opacity: 0.7;
              cursor: not-allowed;
            }
            input#password {
              padding-right: 40px !important; 
            }
            .alert {
              border-radius: 5px;
              padding: 10px;
              margin-bottom: 15px;
              font-size: 14px;
              display: flex;
              align-items: center;
              gap: 10px;
            }
            .alert-danger { background-color: #f8d7da; color: #721c24; border: 1px solid #f5c6cb; }
            .alert-warning { background-color: #fff3cd; color: #856404; border: 1px solid #ffeeba; }
        </style>
    </head>
    <body class="hold-transition login-page" ng-app="tsuruVolks">

        <div class="alerta-mantenimiento ng-scope" ng-controller="loginCtrl" style="width: 100%;background-color: #de0007;color: white;display: none;font-family: Poppins;align-items: center;flex-wrap: wrap;justify-content: center;position: absolute;top: 0; z-index: 1050;">
            <div class="alerta">
                <h2 style="max-width: 600px;text-align: center;">Actualizando Admin Macrom autopartes. Podrá iniciar sesión cuando la Actualización termine.</h2>
            </div>
        </div>

        <div class="login-box" ng-controller="loginCtrl">
            <div class="login-logo">
                <img src="./../asset/Images/logomacrom.png" alt="LOGO IMAGE" />
            </div>
            
            <div class="card">
                <div class="card-body login-card-body">
                    <p class="login-box-msg">Inicio de sesión admin</p>

                    <div class="alert alert-danger" ng-show="loginError && !cuentaBloqueada">
                        <i class="fa fa-exclamation-circle"></i> {{mensajeError}}
                    </div>
                    <div class="alert alert-warning" ng-show="loginError && !cuentaBloqueada && intentosRestantes !== null">
                        <i class="fa fa-info-circle"></i> Intentos restantes: <b>{{intentosRestantes}}</b>
                    </div>
                    <div class="alert alert-danger" ng-show="cuentaBloqueada">
                        <i class="fa fa-lock"></i> Tu cuenta está bloqueada temporalmente.
                        <div ng-if="tiempoRestante > 0" style="margin-left: 5px;">
                            Intenta nuevamente en <b>{{tiempoRestante}}</b> seg.
                        </div>
                    </div>

                    <form method="post" name="frmlogin" id="frmlogin" novalidate>
                        <div class="form-group has-feedback">
                            <span class="fa fa-envelope form-control-feedback"></span>
                            <input type="text" name="login" id="login" class="form-control" placeholder="Usuario" ng-model="login.user" required>
                        </div>

                        <div class="form-group has-feedback">
                            <span class="fa fa-lock form-control-feedback"></span>
                            <input type="password" name="password" id="password" class="form-control" placeholder="Password" ng-model="login.password" required>
                            <button type="button" class="toggle-password-btn" onclick="togglePasswordAdmin('password', this)">
                                <i class="fa fa-eye"></i>
                            </button>
                        </div>

                        <div class="row mt-3">
                            <div class="col-8">
                                &nbsp;
                            </div>
                            <div class="col-4">
                                <button type="submit" class="btn btn-primary btn-block btn-flat" ng-disabled="frmlogin.$invalid || !dataflag" ng-click="btnlogin()">
                                    <span ng-show="dataflag">Entrar</span>
                                    <span ng-show="!dataflag"><i class="fa fa-spinner fa-spin"></i></span>
                                </button>
                            </div>
                        </div>
                    </form>
                </div>
            </div>
        </div>
            
        <script src="./../asset/Plugins/jquery/jquery.min.js"></script>
        <script src="https://cdn.datatables.net/1.10.7/js/jquery.dataTables.min.js"></script>
        <script type="text/javascript" src="./../asset/Js/angular/angular.min.js"></script>
        <script src="./../asset/Js/angular/angular-datatables.min.js"></script>
        <script src="./../asset/Js/angular/angular-recaptcha.min.js"></script>
        <script type="text/javascript" src="./../asset/Js/angular/first.js"></script>
        <script src="./../asset/Plugins/bootstrap/js/bootstrap.bundle.min.js"></script>
        <script src="//cdnjs.cloudflare.com/ajax/libs/toastr.js/latest/toastr.min.js"></script>
        
        <script type="text/javascript" src="Js/login.js"></script>
        
        <script>
            function togglePasswordAdmin(id, btn){
                const input = document.getElementById(id);
                const icon = btn.querySelector('i');
                if(input.type === "password"){
                    input.type = "text";
                    icon.classList.remove("fa-eye");
                    icon.classList.add("fa-eye-slash");
                } else {
                    input.type = "password";
                    icon.classList.remove("fa-eye-slash");
                    icon.classList.add("fa-eye");
                }
            }
        </script>
    </body>
</html>
