<link rel="stylesheet" href="/modulo/Blog/Css/blog_principal.css">
<section ng-controller="BlogCtrl" ng-init="mod='{mod}'" class="global__content mb-5">
    
    <section class="header" ng-repeat="nost in Banner.Escritorio">
        <picture class="header__picture">
            <img loading="lazy" src="images/Banners/{{nost.imagen}}" alt="Banner Blog" style="width: 100%; height: auto; object-fit: cover;">
        </picture>
    </section>

    <section class="bgwhite mt-5" id="MainDark">
        <div class="container">
            
            <div class="text-center mb-5">
                <h1 class="blog-header-title">¿Qué encontrarás aquí?</h1>
                <p class="blog-header-text">
                    En este blog encontrarás desde noticias sobre el mundo automotor, los errores más comunes, hasta tips mecánicos. Todo para que lo puedas implementar desde tu garage o en algunas emergencias.
                </p>
            </div>

            <div class="row">
                <div class="col-lg-4 col-md-6 mb-4" ng-repeat="ent in entradas">
                    
                    <div class="blog-card-principal" ng-click="btnBlodDetalles(ent._id)">
                        
                        <div class="blog-img-wrapper">
                            <img loading="lazy" ng-src="../images/Blog/{{ent.imagendestacada}}" alt="{{ent.Title}}" onerror="this.src='images/refacciones/motor.webp'">
                        </div>
                        
                        <div class="blog-body-principal">
                            <h4 class="blog-title-principal">{{ent.Title}}</h4>
                            <p class="blog-excerpt-principal">
                                {{ent.Contenido}}
                            </p>
                            
                            <div class="blog-read-more">
                                Leer artículo <i class="fas fa-arrow-right"></i>
                            </div>
                        </div>

                    </div>
                    </div>
            </div>

        </div>
    </section>
</section>
